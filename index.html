<p class="subtitle">填写信息 → 提交订单 → 扫码付款 → 代取送达</p>

</div>
<div class="form-field"><label>🏠 送到地址</label><input type="text" id="fAddr" placeholder="如：X栋X单元XXX室"></div>
<div class="form-field"><label>📝 备注（选填）</label><input type="text" id="fNote" placeholder="例如：放门口、到了打电话"></div>
</div>
<div class="card">
<div class="step-title"><span class="step-num">2</span> 📥 添加物品 <span class="tag-opt">选填</span></div>
<div class="input-group">

<button id="classifyBtn">识别</button>
</div>
<div id="tagResult" class="tag-result">

<div class="size-select" id="sizeSelect">

<button class="size-opt" data-s="medium">中件 <span class="sopt-price">2.5元</span></button>
<button class="size-opt" data-s="large">大件 <span class="sopt-price">6.5元</span></button>
</div>
<div class="add-row"><label>数量</label>
<input type="number" id="addQty" value="1" min="1" max="999">
<button class="add-btn" id="addBtn" disabled>➕ 添加到订单</button>
</div>
<div class="common-items" id="commonItems"></div>
</div>
<div class="card" id="cartCard" style="display:none">

<tbody id="cartBody"></tbody></table>
<div class="summary-row" id="summaryArea">
<div id="detailLines"></div>
<div class="floor-line"><span>🚚 送到</span><span id="floorSelector"></span></div>
<div class="summary-line total" id="grandTotal">0.00<small> 元</small></div>
</div>
</div>
<div class="card">
<div class="step-title"><span class="step-num">4</span> 📩 提交订单</div>
<div class="submit-area" id="submitArea">
<button class="submit-btn" id="submitBtn">📩 提交订单</button>
<button class="secondary-btn" id="previewBtn">👁 预览订单</button>
</div>
<div class="notify-status" id="notifyStatus"></div>
<div class="submit-msg" id="submitMsg">
<div class="pre" id="msgContent"></div>
<button class="msg-copy" id="msgCopyBtn">📋 复制订单</button>
</div>
</div>
</div>
<div class="footer">纯本地运行 · 不上传数据</div>
